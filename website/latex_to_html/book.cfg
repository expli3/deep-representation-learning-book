% book.cfg — tex4ht configuration for make4ht
% Minimal config: HTML5, MathJax passthrough, chapter splitting, TikZ SVG.
% All class tagging (theorems, algorithms, etc.) is handled by postprocess.py
% to avoid unbalanced-tag issues with \ConfigureEnv.

% TikZ: use dvisvgm driver when running under tex4ht
\ifdefined\HCode
  \def\pgfsysdriver{pgfsys-dvisvgm4ht.def}

  % Emit a marker before each \eqref so postprocess.py can recover the
  % referenced label when tex4ht outputs ?? (e.g. some align labels).
  \let\DRLorigeqref\eqref
  \renewcommand{\eqref}[1]{%
    \HCode{<!--POSTPROC_EQREF:#1-->}%
    \DRLorigeqref{#1}%
  }

  % Emit markers for plain \ref via \@setref.
  % Install this at begin-document so later package patches don't override it.
  \makeatletter
  \def\DRLInstallSetrefHook{%
    \let\DRLorigsetref\@setref
    \def\@setref##1##2##3{%
      \HCode{<!--POSTPROC_REF:##3-->}%
      \DRLorigsetref{##1}{##2}{##3}%
    }%
  }
  \def\DRLInstallCrefHook{%
    \@ifundefined{@@setcref}{}{%
      \let\DRLorig@@setcref\@@setcref
      \def\@@setcref##1##2##3{%
        \HCode{<!--POSTPROC_CREF:##2-->}%
        \DRLorig@@setcref{##1}{##2}{##3}%
      }%
    }%
    \@ifundefined{@@setcrefrange}{}{%
      \let\DRLorig@@setcrefrange\@@setcrefrange
      \def\@@setcrefrange##1##2##3##4{%
        \HCode{<!--POSTPROC_CREF:##2--><!--POSTPROC_CREF:##3-->}%
        \DRLorig@@setcrefrange{##1}{##2}{##3}{##4}%
      }%
    }%
  }
  \AtBeginDocument{\DRLInstallSetrefHook}
  \AtBeginDocument{\DRLInstallCrefHook}
  \makeatother
\fi

\Preamble{xhtml,html5,mathjax,2,fn-in,charset=utf-8}

% TeX4ht's default HTML config uses the legacy `rungs` wrapper for
% Ghostscript-based PDF image conversion. That binary isn't available in the
% Ubuntu CI environment, but the underlying `gs` executable is.
\Configure{Ghostscript}{gs}

% --- Viewport meta for mobile ---
\Configure{@HEAD}{\HCode{<meta name="viewport" content="width=device-width, initial-scale=1.0">\Hnewline}}

\begin{document}
\EndPreamble
